<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>《房間戰線》機體卡產生器</title>
<style>
/* ============================================================
   基礎
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
:root{ --red:#c01818; --ink:#111; }
body{
  font-family:"Microsoft JhengHei","Noto Sans TC","PingFang TC",sans-serif;
  background:#dedbd4; color:var(--ink);
  -webkit-print-color-adjust:exact; print-color-adjust:exact;
}
.mono{font-family:"Cascadia Mono",Consolas,"Courier New",monospace}
button{font-family:inherit;cursor:pointer}

/* ============================================================
   編輯端(螢幕)
   ============================================================ */
#topbar{
  background:#111;color:#eee;padding:8px 16px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  position:sticky;top:0;z-index:50;border-bottom:3px solid #000;
}
#topbar h1{font-size:16px;letter-spacing:2px;margin-right:6px}
#topbar .sub{font-size:11px;color:#999}
#topbar select{
  font-family:Consolas,monospace;font-size:13px;padding:3px 6px;
  background:#222;color:#eee;border:1px solid #666;
}
#totalBox{font-family:Consolas,monospace;font-size:15px;padding:2px 10px;background:#222;border:1px solid #555}
#totalBox.over{color:#ff6b6b;border-color:#ff6b6b;font-weight:bold}
#topbar button{
  background:#eee;color:#111;border:none;padding:5px 14px;font-size:13px;font-weight:bold;
}
#topbar button:hover{background:#fff}
#topbar button.ghost{background:transparent;color:#bbb;border:1px solid #555;font-weight:normal}
#topbar button.ghost:hover{color:#fff;border-color:#999}

#app{display:flex;gap:14px;padding:14px;align-items:flex-start;max-width:1560px;margin:0 auto}
#unitsCol{flex:1;min-width:540px;display:flex;flex-direction:column;gap:12px}

/* 單機編輯卡 */
.unit{background:#f7f6f2;border:1px solid #888;border-top:5px solid #000}
.unit .uhead{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#eceae3;border-bottom:1px solid #bbb}
.unit .uhead .uno{font-family:Consolas,monospace;font-weight:bold;font-size:13px;background:#000;color:#fff;padding:2px 8px}
.unit .uhead input{
  flex:1;font-size:16px;font-weight:bold;padding:4px 8px;
  border:1px solid #999;background:#fff;font-family:inherit;min-width:120px;
}
.unit .ucost{font-family:Consolas,monospace;font-size:15px;padding:2px 8px;background:#fff;border:1px solid #999;white-space:nowrap}
.unit .ucost.over{color:var(--red);border-color:var(--red);font-weight:bold}
.unit .uwarn{color:var(--red);font-size:12px;font-weight:bold;white-space:nowrap}
.unit .ubody{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.urow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:13px}
.urow .lab{font-weight:bold;background:#000;color:#fff;padding:1px 7px;font-size:12px;letter-spacing:2px}
.urow label.armor{display:flex;align-items:center;gap:3px;cursor:pointer}
.urow .armorhint{color:#666;font-size:11px}
.stepper{display:flex;align-items:center;gap:6px}
.stepper button{width:26px;height:26px;font-size:15px;font-weight:bold;background:#fff;border:1px solid #777}
.stepper button:hover{background:#ddd}
.stepper .sval{font-family:Consolas,monospace;font-size:15px;font-weight:bold;min-width:24px;text-align:center}
.stepper .scost{font-family:Consolas,monospace;font-size:12px;color:#444}

.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.slot{
  border:1px dashed #999;background:#fff;min-height:46px;padding:4px 6px;
  display:flex;flex-direction:column;gap:2px;
}
.slot .slab{font-size:11px;font-weight:bold;color:#555;letter-spacing:1px}
.slot .hint{font-size:11px;color:#bbb}
.slot.dragok{border:2px solid #000;background:#f0efe8}
.slot.dragbad{border:2px solid var(--red);background:#fbeaea}
.chip{
  display:inline-flex;align-items:center;gap:5px;align-self:flex-start;
  background:#111;color:#fff;font-size:12px;padding:3px 8px;cursor:pointer;max-width:100%;
}
.chip:hover{background:var(--red)}
.chip i{font-family:Consolas,monospace;font-style:normal;color:#ffd6d6}
.chip .x{font-weight:bold}
.gpool{
  border:1px dashed #999;background:#fff;min-height:40px;padding:5px 6px;
  display:flex;flex-wrap:wrap;gap:5px;align-items:flex-start;flex:1;
}
.gpool.dragok{border:2px solid #000;background:#f0efe8}
.gpool.dragbad{border:2px solid var(--red);background:#fbeaea}
.gpool .hint{font-size:11px;color:#bbb}
.gpool .chip{background:#444}
.gpool .chip:hover{background:var(--red)}

/* 右側清單面板 */
#catalog{
  width:370px;background:#f7f6f2;border:1px solid #888;border-top:5px solid #000;
  position:sticky;top:60px;max-height:calc(100vh - 80px);overflow-y:auto;
}
#catalog h2{
  font-size:13px;letter-spacing:3px;background:#000;color:#fff;
  padding:4px 10px;position:sticky;top:0;z-index:2;
}
#catalog .csec{padding:6px 8px 10px}
#catalog .csec h3{
  font-size:12px;letter-spacing:2px;border-bottom:2px solid #000;
  margin:6px 0 5px;padding-bottom:2px;display:flex;justify-content:space-between;
}
#catalog .csec h3 span{color:#888;font-weight:normal;letter-spacing:0}
.citem{
  background:#fff;border:1px solid #aaa;border-left:4px solid #000;
  padding:4px 8px;margin-bottom:4px;cursor:grab;font-size:13px;
}
.citem:active{cursor:grabbing}
.citem:hover{border-color:#000;background:#f3f1ea}
.citem .t{display:flex;justify-content:space-between;font-weight:bold}
.citem .t .pt{font-family:Consolas,monospace}
.citem .m{font-family:Consolas,monospace;font-size:11px;color:#555;margin-top:1px}
.citem .g{font-size:11px;color:#777}
.citem.eq{border-left-color:#777}
.citem.mod{border-left-color:#b00}
.citem.exp{border-left-color:#7a3; background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(120,160,40,.06) 6px,rgba(120,160,40,.06) 12px)}
.citem.shield{border-left-color:#48a}
.expToggle{font-size:13px;color:#222;cursor:pointer;user-select:none;padding:3px 8px;background:#eef6e0;border:1px solid #bcd28a;border-radius:3px}
.expbox{margin-top:.6mm;border:.3mm dashed #888;padding:.8mm 1.2mm}
.expttl{font-size:1.9mm;font-weight:bold;letter-spacing:.4mm;color:#555;margin-bottom:.4mm}
.exprow{font-size:1.85mm;line-height:1.25;margin-bottom:.3mm}
.exprow b{font-weight:bold}
.exprow span{color:#444;margin-left:.6mm}
#optBox{position:relative}
#optBox summary{cursor:pointer;font-size:13px;padding:3px 8px;background:#eee;color:#222;border:1px solid #ccc;border-radius:3px;user-select:none}
#optBox[open] summary{background:#ddd;color:#222}
#optList{position:absolute;z-index:20;top:28px;right:0;width:320px;background:#fff;border:1px solid #999;box-shadow:0 4px 16px rgba(0,0,0,.2);padding:6px}
.optrow{display:flex;gap:8px;align-items:flex-start;padding:6px;border-bottom:1px solid #eee;cursor:pointer}
.optrow:last-child{border-bottom:none}
.optrow input{margin-top:3px}
.optrow b{display:block;font-size:13px;color:#222}
.optrow i{display:block;font-size:11px;color:#666;font-style:normal;line-height:1.3}
.mbadge{display:inline-block;background:#000;color:#fff;font-size:11px;padding:1px 6px;margin-left:4px;cursor:pointer}
.modbadge{display:inline-block;background:#000;color:#fff;font-size:1.9mm;padding:0 .8mm;margin-left:1mm;vertical-align:middle}

#previewHead{max-width:1560px;margin:6px auto 0;padding:0 14px;display:flex;align-items:baseline;gap:14px}
#previewHead h2{font-size:14px;letter-spacing:3px}
#previewHead .tip{font-size:12px;color:#555}
#sheetWrap{padding:10px 14px 60px;max-width:1560px;margin:0 auto}

/* ============================================================
   列印頁(A4 直式 210×297mm,三等份)
   ============================================================ */
@page{size:A4 portrait;margin:0}
.sheet{
  width:210mm;height:296.6mm;background:#fff;position:relative;overflow:hidden;
  box-shadow:0 2px 14px rgba(0,0,0,.35);
  font-size:2.6mm;line-height:1.35;
}
/* 三等份 93.7mm×3=281.1mm,頁底留 15.5mm 給獨立小抄橫條 */
.card{width:210mm;height:93.7mm;position:relative;overflow:hidden}
.card.cut{border-bottom:0.25mm dashed #bbb}

/* --- 熱條 --- */
.heat{
  position:absolute;left:0;bottom:1.5mm;width:8mm;
  display:flex;flex-direction:column-reverse;
  border-bottom:0.35mm solid #000;border-right:0.35mm solid #000;
}
.hc{
  height:var(--ch);flex:0 0 var(--ch);
  display:flex;align-items:center;justify-content:center;
  font-family:Consolas,monospace;font-size:2.2mm;
  border-top:0.18mm solid #888;
}
.hc.capline{border-top:1.1mm solid #000}
.hc.capline.dash{border-top:1.1mm dashed #000}
.hc.capv{font-weight:bold}
.hc.ov{
  background:
    repeating-linear-gradient(45deg, rgba(180,24,24,.55) 0, rgba(180,24,24,.55) .6mm, transparent .6mm, transparent 1.7mm),
    #f5e2e2;
}
.ovlab{
  position:absolute;right:.2mm;writing-mode:vertical-rl;
  display:flex;align-items:center;justify-content:center;
  font-size:2.5mm;font-weight:bold;color:var(--red);letter-spacing:1mm;
  pointer-events:none;
}

/* --- 卡片主體 --- */
.cbody{
  position:absolute;left:11mm;right:0;top:0;bottom:0;
  padding:1.6mm 4mm 1.2mm 2mm;
  display:flex;flex-direction:column;
}
.bar{height:1mm;background:#000;flex:0 0 auto;margin:.5mm 0}
.bar.thin{height:.45mm}

.chead{display:flex;align-items:baseline;gap:4mm;flex:0 0 auto}
.chead .cname{font-size:5mm;font-weight:bold;letter-spacing:.8mm}
.chead .cname.blank{color:#999;font-weight:normal;font-size:3.4mm}
.chead .nameline{flex:1;border-bottom:.35mm solid #000;min-width:40mm;height:5.5mm}
.chead .cpts{font-family:Consolas,monospace;font-size:3.6mm;font-weight:bold;white-space:nowrap}
.chead .carm{font-size:2.8mm;white-space:nowrap;margin-left:auto}
.chead .carm b{border:.3mm solid #000;padding:0 1mm}

.srow{display:flex;align-items:center;gap:1.6mm;flex:0 0 auto;margin:.7mm 0 .4mm;flex-wrap:nowrap}
.srow .slab{font-weight:bold;font-size:2.8mm;letter-spacing:1mm;background:#000;color:#fff;padding:0 1.2mm}
.sb{width:4.4mm;height:4.4mm;border:.35mm solid #000;flex:0 0 auto}
.sth{width:1.4mm;height:5.6mm;background:var(--red);border:.25mm solid #000;flex:0 0 auto;margin:0 .3mm}
.snote{font-size:2.3mm;color:#333;margin-left:2mm;white-space:nowrap}

.wgroups{display:grid;grid-template-columns:1fr 1fr;column-gap:4mm;row-gap:.7mm;flex:0 0 auto;overflow:hidden;margin-top:.4mm}
.wg{min-height:8mm}
.wg.spacer{border:none}
.wrow.empty{min-height:3.4mm}
.wgt{
  display:flex;align-items:center;gap:1.6mm;
  border-bottom:.45mm solid #000;font-size:2.7mm;padding-bottom:.2mm;margin-bottom:.4mm;
}
.wgt b{letter-spacing:.6mm}
.wgt .cbl{font-size:2.2mm;color:#333;margin-left:auto;display:flex;align-items:center;gap:.7mm}
.cb{width:2.7mm;height:2.7mm;border:.32mm solid #000;display:inline-block;flex:0 0 auto;background:#fff}
.wrow{display:flex;flex-wrap:wrap;align-items:baseline;column-gap:1.8mm;font-size:2.45mm;padding:.15mm 0;border-bottom:.15mm dotted #bbb}
.wrow .wname{font-weight:bold;font-size:2.6mm}
.wrow .wname.basic{text-decoration:underline;text-underline-offset:.5mm;text-decoration-thickness:.35mm}
.wrow .wpts{font-family:Consolas,monospace;font-weight:bold}
.wrow .wpts::after{content:"點";font-size:2mm;font-weight:normal}
.wrow .wstat{font-family:Consolas,monospace;font-size:2.35mm}
.wrow .wtag{font-size:2.2mm;color:#222}
.wrow .wchk{display:inline-flex;align-items:center;gap:.6mm;font-size:2.15mm;margin-left:auto;white-space:nowrap}
.wrow .wchk .cb{width:2.4mm;height:2.4mm}
.dots{display:inline-flex;gap:.5mm;align-items:center}
.dot{width:2.5mm;height:2.5mm;border:.3mm solid #000;border-radius:50%;display:inline-block}
.wrow.empty{color:#999;font-size:2.3mm;border-bottom:.15mm dotted #ccc}
.wrow.writein{height:3.6mm;border-bottom:.2mm dotted #999}

.gearline{flex:0 0 auto;font-size:2.5mm;border-top:.45mm solid #000;padding-top:.4mm;margin-top:.3mm}
.gearline .glab{font-weight:bold;background:#000;color:#fff;padding:0 1.2mm;font-size:2.5mm;letter-spacing:1mm;margin-right:1.5mm}
.gearline .gnote{color:#555;font-size:2.2mm}

.notesrow{flex:1 1 auto;display:flex;align-items:flex-start;gap:2mm;margin-top:.8mm;min-height:0}
.notesrow .nlab{font-size:2.4mm;font-weight:bold;letter-spacing:.5mm;writing-mode:vertical-rl;border-right:.35mm solid #000;padding-right:.6mm;align-self:stretch;max-height:22mm}
.ng{display:grid;grid-template-columns:repeat(20,1fr);grid-auto-rows:5mm;flex:1 1 auto;border-left:.3mm solid #000;border-top:.3mm solid #000}
.ng span{position:relative;border-right:.3mm solid #000;border-bottom:.3mm solid #000}
.ng span i{position:absolute;top:.2mm;left:.6mm;font-style:normal;font-size:1.9mm;color:#b8b8b8;font-family:Consolas,monospace;line-height:1}
.nhint{font-size:2.1mm;color:#888;align-self:flex-end}

/* --- 小抄橫條(頁面最下緣,獨立於機體卡之外) --- */
.cheat{
  position:absolute;left:0;right:0;bottom:0;height:15.5mm;
  border-top:1.1mm solid #000;background:#fff;
  padding:.7mm 4mm 0 3mm;font-size:2.25mm;line-height:1.5;
}
.cheat .cline b{background:#000;color:#fff;padding:0 .9mm;margin-right:.6mm;font-size:2.1mm}
.cheat .foot{display:flex;justify-content:space-between;color:#555;font-size:1.95mm;margin-top:.3mm}

/* ============================================================
   列印模式
   ============================================================ */
@media print{
  body{background:#fff}
  #topbar,#app,#previewHead{display:none !important}
  #sheetWrap{padding:0;margin:0;max-width:none}
  .sheet{box-shadow:none;margin:0}
}
</style>
</head>
<body>

<!-- ==================== 編輯端 ==================== -->
<div id="topbar">
  <h1>房間戰線|機體卡產生器</h1>
  <span class="sub">編組→列印 A4</span>
  <label>預算
    <select id="budgetSel">
      <option value="duel">決鬥 100</option>
      <option value="team">3v3 250</option>
      <option value="deluxe">3v3豪華 350</option>
    </select>
  </label>
  <span id="capInfo" class="sub"></span>
  <details id="optBox"><summary>可選規則</summary><div id="optList"></div></details>
  <label class="expToggle"><input type="checkbox" id="expChk" data-act="expchk"> 實驗內容</label>
  <span id="totalBox">合計 0/250</span>
  <button id="btnPrint">列印</button>
  <button id="btnHelper" style="background:#c01818;color:#fff">⚔ 以此配置開戰</button>
  <button id="btnShare" class="ghost">複製分享連結</button>
  <button id="btnSample" class="ghost">載入範例</button>
  <button id="btnClear" class="ghost">全部清空</button>
  <a id="homeLink" href="index.html" class="ghost" style="text-decoration:none;color:#bbb;border:1px solid #555;padding:5px 10px;font-size:13px">⌂ 入口</a>
</div>

<div id="app">
  <div id="unitsCol"></div>
  <div id="catalog"></div>
</div>

<div id="previewHead">
  <h2>列印預覽</h2>
  <span class="tip">列印設定:邊界=無、縮放=100%、背景圖形=開啟(灰階雷射可)</span>
</div>
<div id="sheetWrap"><div class="sheet" id="sheet"></div></div>

<script>
/* ============================================================
   遊戲數據(單一資料來源——數值實測後請直接修改此區)
   ============================================================ */
const DATA = {
  "chassis": { "evade": 4, "baseHeatCap": 10, "coverBonus": 2 },
  "structureCost": [3,3,3,3,5,5,8,8,12,12],
  "budgets": { "duel": {"total":100,"unitCap":100}, "team": {"total":250,"unitCap":null}, "deluxe": {"total":350,"unitCap":null} },
  "hardpoints": ["左肩臂","右肩臂","左腿","右腿","背部"],
  "options": [
    { "id":"freeStruct5", "name":"免費基礎結構 5", "note":"每機前 5 點結構免費(第 6 骰起照常遞增計價)。墊高脆皮機下限,節奏更接近日系。", "affectsCost":true },
    { "id":"partLoss", "name":"部位破壞", "note":"結構過半後受創擲 d6 破壞掛載點。關閉則傷害僅減結構。", "default":true },
    { "id":"physicalRemoval", "name":"實體拆件", "note":"被破壞/拋棄部件真的從模型上拆下;關閉則卡上畫記。純外觀。" },
    { "id":"deluxe350", "name":"3v3 豪華 350", "note":"3v3 預算改 350、單機上限 157(等同預算選單的豪華檔,放這裡方便一鍵)。" }
  ],
  "armors": ["複合","陶瓷","反射"],
  "armorRing": { "複合": {"blocks":"化學能","weak":"能量"}, "陶瓷": {"blocks":"動能","weak":"化學能"}, "反射": {"blocks":"能量","weak":"動能"} },
  "equipment": [
    { "id":"thruster", "name":"推進器", "cost":8, "note":"解鎖高速移動" },
    { "id":"flight", "name":"飛行組件", "cost":12, "note":"解鎖滯空" },
    { "id":"heatsink", "name":"散熱器", "cost":"8*N", "note":"熱容量+3,第N具8×N點", "stackable":true },
    { "id":"rack", "name":"擴充掛架", "cost":12, "note":"背部+1槽;部位骰5兩件全毀", "unique":true },
    { "id":"smoke", "name":"煙霧彈發射器", "cost":8, "note":"即時裝置·彈藥1不可裝填;雙向遮蔽至多3格(移動中啟動1格),1 UD 內降為掩體;移動/近戰即消散", "stackable":true },
    { "id":"vulcan", "name":"頭部火神炮", "cost":6, "exp":true, "stackable":true, "note":"彈藥1·結算窗:我方涉入之近戰攻擊結算後可宣告,使交戰對手本場近戰對拼骰池-1(射擊不受影響)" },
    { "id":"shield_arm", "name":"臂盾", "cost":6, "exp":true, "note":"一次性·部位破壞最終確定後可改由臂盾承受(僅改派至盾自身),臂盾報廢" },
    { "id":"shield_big", "name":"大盾", "cost":18, "exp":true, "note":"一次性·強制抵銷我方第一次受到的攻擊傷害(過熱/復位熱傷除外),抵銷後報廢" },
    { "id":"shield_heavy", "name":"重盾", "cost":24, "exp":true, "stackable":true, "note":"一次性·二選一:可選時機全擋一次傷害,或改派一次部位破壞由其承受" }
  ],
  "mods": [
    { "id":"overload", "name":"過載復位", "cost":10, "excludeTags":["格鬥"], "excludeRackBack":true, "badge":"復位", "note":"結算後可取消收招格,取消n格承受1+2+...+n熱" }
  ],
  "weapons": [
    { "name":"據點型能量盾", "type":"能量", "action":"全系", "pow":"—", "slots":"維2+反1", "heat":"2+2+3", "cost":14, "exp":true, "shield":true, "tags":[], "note":"佔機動系3格(不能移動)·維持2格給掩體·第3格彈反:沒收該格第一發·彈反格可開火(破綻照算)·彈反後結束需裝填2" },
    { "name":"機動型能量盾", "type":"能量", "action":"武裝", "pow":"—", "slots":"掩1+反1", "heat":"2+3", "cost":10, "exp":true, "shield":true, "tags":[], "note":"佔武裝系2格(不能開火)·首格給掩體·第2格彈反:沒收該格第一發·彈反格不可攻擊·彈反後結束需裝填2" },

/* ============================================================
   工具
   ============================================================ */
const LS_KEY = 'roomfront_card_draft_v1';
const SLOT_KEYS = ['左肩臂','右肩臂','左腿','右腿','背部','背部2'];
const weaponByName = Object.fromEntries(DATA.weapons.map(w=>[w.name,w]));
function expOK(item){ return !item.exp || (state && state.expEnabled); }
function shownWeapons(){ return DATA.weapons.filter(expOK); }
function shownEquip(){ return DATA.equipment.filter(expOK); }
const modById = Object.fromEntries((DATA.mods||[]).map(m=>[m.id,m]));
const equipById = Object.fromEntries(DATA.equipment.map(e=>[e.id,e]));
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function emptyUnit(){
  return { name:'', armor:'複合', structure:5,
    mounts:{左肩臂:null,右肩臂:null,左腿:null,右腿:null,背部:null,背部2:null}, gear:[], wmods:{} };
}
function sampleState(){
  const units = DATA.sampleForce.map(s=>{
    const u = emptyUnit();
    u.name = s.name; u.armor = s.armor; u.structure = s.structure;
    for(const [hp,arr] of Object.entries(s.mounts)){
      if(hp==='背部'){ u.mounts['背部']=arr[0]||null; u.mounts['背部2']=arr[1]||null; }
      else u.mounts[hp]=arr[0]||null;
    }
    u.gear = s.gear.map(n=>DATA.equipment.find(e=>e.name===n).id);
    return u;
  });
  return { budget:'team', units };
}
function normalize(st){
  const out = { budget: DATA.budgets[st&&st.budget] ? st.budget : 'team', options: {}, expEnabled: !!(st&&st.expEnabled), units: [] };
  const optDefs = DATA.options||[];
  for(const o of optDefs) out.options[o.id] = o.default===true;
  if(st && st.options && typeof st.options==='object'){
    for(const o of optDefs) if(typeof st.options[o.id]==='boolean') out.options[o.id]=st.options[o.id];
  }
  if(out.options.deluxe350 && out.budget!=='duel') out.budget='deluxe'; // 豪華開關連動預算
  for(let i=0;i<3;i++){
    const raw = (st && st.units && st.units[i]) || {};
    const u = emptyUnit();
    u.name = typeof raw.name==='string' ? raw.name.slice(0,24) : '';
    u.armor = DATA.armors.includes(raw.armor) ? raw.armor : '複合';
    u.structure = Math.min(10, Math.max(1, parseInt(raw.structure,10)||5));
    for(const k of SLOT_KEYS){
      const v = raw.mounts && raw.mounts[k];
      if(v && weaponByName[v]) u.mounts[k]=v;
    }
    if(Array.isArray(raw.gear)) u.gear = raw.gear.filter(id=>equipById[id]);
    if(!u.gear.includes('rack')) u.mounts['背部2']=null;
    if(raw.wmods && typeof raw.wmods==='object'){
      for(const [k,mid] of Object.entries(raw.wmods)){
        if(modCanAttach(u,k,mid)) u.wmods[k]=mid;
      }
    }
    out.units.push(u);
  }
  return out;
}

/* ---- 計價 ---- */
function structCost(n){
  let c = DATA.structureCost.slice(0,n).reduce((a,b)=>a+b,0);
  if(state && state.options && state.options.freeStruct5){
    c -= DATA.structureCost.slice(0, Math.min(5,n)).reduce((a,b)=>a+b,0); // 前5骰免費
  }
  return c;
}
function gearCost(gear){
  let sinks=0, c=0;
  for(const id of gear){
    if(id==='heatsink'){ sinks++; c += 8*sinks; }
    else c += equipById[id].cost;
  }
  return c;
}
function unitWeaponEntries(u){
  // 回傳 [slotKey, weapon] 陣列;雙手武器(佔雙肩臂)只計一次,掛在左肩臂
  const out=[];
  for(const k of SLOT_KEYS){
    const n=u.mounts[k];
    if(!n) continue;
    const w=weaponByName[n];
    if(k==='右肩臂' && w.twoHanded && u.mounts['左肩臂']===n) continue; // 雙手:右側為佔位
    out.push([k,w]);
  }
  return out;
}
function unitCost(u){
  return structCost(u.structure)
    + unitWeaponEntries(u).reduce((a,[,w])=>a+w.cost,0)
    + gearCost(u.gear)
    + modsCost(u);
}
function modCanAttach(u, hp, mid){
  const m = modById[mid]; if(!m) return false;
  const n = u.mounts[hp]; if(!n) return false;
  const w = weaponByName[n];
  if((m.excludeTags||[]).some(t=>(w.tags||[]).includes(t))) return false;            // 限非格鬥
  if(m.excludeRackBack && hp.startsWith('背部') && u.gear.includes('rack')) return false; // 掛架互斥
  return true;
}
function modsCost(u){
  return Object.values(u.wmods||{}).reduce((a,mid)=>a+((modById[mid]||{}).cost||0),0);
}
function sinkCount(u){ return u.gear.filter(id=>id==='heatsink').length; }
function heatCap(u){ return DATA.chassis.baseHeatCap + 3*sinkCount(u); }
function isUnitEmpty(u){
  return !u.name && u.gear.length===0 && SLOT_KEYS.every(k=>!u.mounts[k]);
}

/* ---- 武器顯示字串 ---- */
function statStr(w){
  const hit = (w.melee!=null) ? '近'+w.melee : '命'+w.acc;
  let dist='';
  if(w.melee==null){
    const seg=[];
    if(w.near) seg.push('近'+(w.near==='X'?'✕':w.near));
    if(w.far)  seg.push('遠'+(w.far==='X'?'✕':w.far));
    if(seg.length) dist=' ['+seg.join('/')+']';
  }
  return hit+dist+' 威'+w.pow+' 格'+w.slots+' 熱'+String(w.heat).replace('/','÷');
}
function tagStr(w){
  const t=[...(w.tags||[])];
  if(w.action==='全系' && !String(w.slots).startsWith('全')) t.unshift('全系');
  return t.join('·');
}

/* ---- 序列化 ---- */
function encodeState(st){
  const json = JSON.stringify(st);
  return btoa(unescape(encodeURIComponent(json))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decodeState(s){
  const b64 = s.replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(escape(atob(b64))));
}

/* ============================================================
   狀態
   ============================================================ */
let state = null;

function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
  try{ history.replaceState(null,'','#f='+encodeState(state)); }catch(e){}
}
function boot(){
  let st=null;
  const m = location.hash.match(/^#f=(.+)$/);
  if(m){ try{ st=decodeState(m[1]); }catch(e){} }
  if(!st){ try{ const raw=localStorage.getItem(LS_KEY); if(raw) st=JSON.parse(raw); }catch(e){} }
  if(!st) st = sampleState();
  state = normalize(st);
}

  const shields= allW.filter(w=> w.shield);
  let html = '<h2>武器/裝備清單(拖入左側)</h2><div class="csec">';

    html += list.map(w=>citem(w)).join('');
  }
  html += '<h3>格鬥武器<span>近戰</span></h3>' + melee.map(w=>citem(w)).join('');
  if(shields.length) html += '<h3>實驗護盾<span>佔掛載點</span></h3>' + shields.map(w=>citem(w)).join('');
  html += '<h3>改裝<span>拖到已掛載的武器上</span></h3>';

      '<div class="t"><span>'+esc(m.name)+'</span><span class="pt">'+m.cost+'點/件</span></div>'+
      '<div class="g">'+esc(m.note)+'(限非格鬥;掛架背部不可)</div></div>'
  ).join('');
  html += '<h3>裝備<span>放入裝備池</span></h3>';
  html += shownEquip().map(e=>
    '<div class="citem eq'+(e.exp?' exp':'')+'" draggable="true" data-kind="e" data-id="'+e.id+'">'+
      '<div class="t"><span>'+esc(e.name)+'</span><span class="pt">'+(e.cost==='8*N'?'8×N':e.cost)+'點</span></div>'+
      '<div class="g">'+esc(e.note)+'</div></div>'
  ).join('');
  html += '</div>';
  box.innerHTML = html;
}
function citem(w){
  return '<div class="citem'+(w.exp?' exp':'')+(w.shield?' shield':'')+'" draggable="true" data-kind="w" data-name="'+esc(w.name)+'">'+

    ((w.tags||[]).length||w.action==='全系' ? '<div class="g">'+esc(tagStr(w))+'</div>' : '')+

function renderUnits(){

    const cost = unitCost(u);

    const slotKeys = ['左肩臂','右肩臂','左腿','右腿','背部'].concat(hasRack?['背部2']:[]);
    const slots = slotKeys.map(k=>{
      const n = u.mounts[k];
      let inner;
      if(n){
        const w = weaponByName[n];
        const two = w.twoHanded && (k==='左肩臂'||k==='右肩臂');
        const mid = u.wmods[k], mod = mid && modById[mid];

    }).join('') || '<span class="hint">拖放裝備(推進器/飛行組件/散熱器/擴充掛架)</span>';
    const sc = structCost(u.structure);

    const ring = DATA.armorRing[u.armor];
    return '<div class="unit">'+

            '<button data-act="s-" data-u="'+i+'">−</button>'+

/* ============================================================

   ============================================================ */
function heatStripHTML(cap, blank){
  const n = cap + 6;                       // 刻度 0 至 cap+5
  const ch = Math.min(8, 90/n);            // 每格高(mm),放不下時均分縮小(卡高93.7-上下留白)
  let cells='';
  for(let v=0; v<n; v++){
    const cls = ['hc'];
    if(v>=cap) cls.push('ov');             // 熱≥容量=過熱
    if(v===cap) cls.push('capv');
    if(v===cap-1) cls.push('capline'+(blank?' dash':''));  // 粗線=容量格下緣(12|13 邊界)
    cells += '<div class="'+cls.join(' ')+'" style="--ch:'+ch.toFixed(3)+'mm">'+v+'</div>';
  }
  const zone = ((n-cap)*ch).toFixed(3);
  return '<div class="heat">'+cells+
    '<div class="ovlab" style="top:0;height:'+zone+'mm"></div></div>';
}

function structRowHTML(n, blank){
  const th = Math.floor(n/2);
  let boxes='';
  for(let i=1;i<=n;i++){
    boxes += '<span class="sb"></span>';
    if(!blank && i===th) boxes += '<span class="sth"></span>';
  }
  return '<div class="srow"><span class="slab">結構</span>'+boxes+
    '<span class="snote">'+(blank?'門檻=⌊格數/2⌋|':'')+'過門檻:每次受創擲部位d6</span></div>';
}

function weaponRowHTML(w, mod){
  const basic = (w.tags||[]).includes('基本');
  const ammo = w.ammo ? '<span class="dots">'+'<span class="dot"></span>'.repeat(w.ammo)+'</span>' : '';
  return '<div class="wrow">'+
    '<span class="wname'+(basic?' basic':'')+'">'+esc(w.name)+(mod?'<span class="modbadge">'+esc(mod.badge||mod.name)+'</span>':'')+'</span>'+
    '<span class="wpts">'+(mod?w.cost+'+'+mod.cost:w.cost)+'</span>'+
    '<span class="wstat">'+esc(statStr(w))+'</span>'+
    (tagStr(w)?'<span class="wtag">'+esc(tagStr(w))+'</span>':'')+
    '<span class="wchk">拋棄<span class="cb"></span>'+ammo+'</span>'+
    '</div>';
}

function groupHTML(title, rowsHtml){
  return '<div class="wg"><div class="wgt"><b>'+title+'</b>'+
    '<span class="cbl"><span class="cb"></span>點位已毀</span></div>'+rowsHtml+'</div>';
}

function cardHTML(u, last){
  if(isUnitEmpty(u)) return blankCardHTML(last);
  const cap = heatCap(u);
  const ring = DATA.armorRing[u.armor];
  const hasRack = u.gear.includes('rack');

  // 武器分群:固定 2 欄(左肩臂|右肩臂/左腿|右腿/背部|掛架),每格固定佔位
  function hpCell(hp){
    const n = u.mounts[hp];
    if(!n) return groupHTML(hp==='背部2'?'背部(掛架)':hp, '<div class="wrow empty"></div>');
    const w = weaponByName[n];
    if(hp==='右肩臂' && w.twoHanded && u.mounts['左肩臂']===n)
      return groupHTML(hp, '<div class="wrow empty">〈雙手武器佔用:'+esc(n)+'〉</div>');
    const title = hp==='背部2' ? '背部(掛架)' : hp + (w.twoHanded?'+右肩臂(雙手)':'');
    return groupHTML(title, weaponRowHTML(w, modById[u.wmods[hp]]));
  }
  let groups = hpCell('左肩臂')+hpCell('右肩臂')+hpCell('左腿')+hpCell('右腿')+hpCell('背部')+
    (hasRack ? hpCell('背部2') : '<div class="wg spacer"></div>');

  // 裝備列
  let sinkSeen=0;
  const gparts = [];
  const counted = {};
  for(const id of u.gear){
    if(id==='heatsink'){ sinkSeen++; continue; }
    counted[id]=(counted[id]||0)+1;
  }
  for(const id of Object.keys(counted)){
    const e=equipById[id];
    gparts.push(esc(e.name)+(counted[id]>1?'×'+counted[id]:'')+'<span class="gnote">〔'+esc(e.note)+'〕</span>');
  }
  if(sinkSeen) gparts.push('散熱器×'+sinkSeen+'<span class="gnote">〔熱容量+3/具→容量'+cap+'〕</span>');
  const gearline = gparts.length ? gparts.join('、') : '<span class="gnote">(無)</span>';

  return '<div class="card'+(last?' last cut':' cut')+'">'+
    heatStripHTML(cap,false)+
    '<div class="cbody">'+
      '<div class="chead">'+
        '<span class="cname">'+esc(u.name||'(未命名)')+'</span>'+
        '<span class="cpts">'+unitCost(u)+'點</span>'+
        '<span class="carm">裝甲 <b>'+u.armor+'</b> | 弱點:'+ring.weak+'</span>'+
      '</div><div class="bar"></div>'+
      structRowHTML(u.structure,false)+
      '<div class="wgroups">'+groups+'</div>'+
      '<div class="gearline"><span class="glab">裝備</span>'+gearline+'</div>'+
      expNotesHTML(u)+
      notesHTML()+
    '</div></div>';
}

function blankCardHTML(last){
  let groups='';
  for(const hp of ['左肩臂','右肩臂','左腿','右腿','背部']){
    groups += groupHTML(hp,'<div class="wrow writein"></div><div class="wrow writein"></div>');
  }
  groups += groupHTML('背部(掛架)','<div class="wrow writein"></div><div class="wrow writein"></div>');
  return '<div class="card'+(last?' last cut':' cut')+'">'+
    heatStripHTML(DATA.chassis.baseHeatCap,true)+
    '<div class="cbody">'+
      '<div class="chead"><span class="cname blank">機體名稱</span><span class="nameline"></span>'+
        '<span class="cpts">____點</span>'+
        '<span class="carm">裝甲 複合<span class="cb"></span> 陶瓷<span class="cb"></span> 反射<span class="cb"></span></span>'+
      '</div><div class="bar"></div>'+
      structRowHTML(10,true)+
      '<div class="wgroups">'+groups+'</div>'+
      '<div class="gearline"><span class="glab">裝備</span><span class="gnote">基礎熱容量10,散熱器每具+3(熱條容量線以虛線示基礎10)</span></div>'+
      notesHTML()+
    '</div></div>';
}

function notesHTML(){
  const rows = state.budget==='duel' ? 2 : 4;
  let cells='';
  for(let i=0;i<rows*20;i++) cells += '<span>'+(i%5===0?'<i>'+(i+1)+'</i>':'')+'</span>';
  return '<div class="notesrow"><span class="nlab">筆記</span>'+
    '<div class="ng">'+cells+'</div>'+
    '</div>';
}

function expNotesHTML(u){
  const items=[];
  // 掛載點上的實驗武器(能量盾等)
  for(const k of Object.keys(u.mounts)){
    const n=u.mounts[k]; const w=n&&weaponByName[n];
    if(w&&w.exp) items.push([w.name, w.note||'']);
  }
  // 裝備池實驗品
  const seen={};
  for(const id of u.gear){
    const e=equipById[id];
    if(e&&e.exp){ if(seen[id]){seen[id]++;continue;} seen[id]=1; items.push([e.name+(/* count later */''), e.note||'']); }
  }
  // 補計數
  if(!items.length) return '';
  const rows=items.map(([nm,nt])=>'<div class="exprow"><b>'+esc(nm)+'</b>'+(nt?'<span>'+esc(nt)+'</span>':'')+'</div>').join('');
  return '<div class="expbox"><div class="expttl">實驗規則說明</div>'+rows+'</div>';
}
function activeOptsLabel(){
  const on = (DATA.options||[]).filter(o=>state&&state.options&&state.options[o.id]).map(o=>o.name);
  return on.length? on.join('・') : '標準規則';
}
function cheatHTML(){
  return '<div class="cheat">'+
    '<div class="cline"><b>移動</b>步行≤1UD=1格·散2|步行2UD=2格|噴射=1格·每UD+2熱|高速=2格·4UD·每UD+2熱·視同掩體·全系|滯空移動每UD另+1熱</div>'+
    '<div class="cline"><b>行動</b>空過=1格·散4|裝填=武裝行動·可與機動並行·裝填中=破綻 <b>門檻</b>普通5+/優勢4+/劣勢6+(同向不疊,最多±1)|掩體=迴避+2(布林不疊加)</div>'+
    '<div class="cline"><b>破綻</b>(攻擊/棄裝/裝填之非命中格):遠程打=迴避劣勢|近戰打=自動命中 <b>過熱</b>(熱≥容量):全擲骰劣勢,過熱中每+1熱=+1傷 <b>復位</b>結算後取消收招n格=1+2+…+n熱</div>'+
    '<div class="cline"><b>距離</b>[近/遠]=該距離優劣勢階數(優1=4+·優2溢出+1骰;劣1=6+·劣2溢出-1骰)·近≤1UD遠>1UD·✕=不可攻擊|命中段算距離·威力段算剋制·兩段獨立</div>'+
    '<div class="foot"><span>《房間戰線》機體卡|本表單為粉絲自製,非商業用途。</span><span class="mono">啟用:'+esc(activeOptsLabel())+'</span></div>'+
    '</div>';
}

function renderSheet(){
  const sheet = document.getElementById('sheet');
  sheet.innerHTML =
    cardHTML(state.units[0],false)+
    cardHTML(state.units[1],false)+
    cardHTML(state.units[2],true)+
    cheatHTML();
}

function renderAll(){
  renderUnits();
  renderTotals();
  renderOptions();
  renderCatalog();
  renderSheet();
}
function commit(){ save(); renderAll(); }

/* ============================================================
   拖放與事件
   ============================================================ */
let dragPayload = null;

document.addEventListener('dragstart', e=>{
  const it = e.target.closest && e.target.closest('.citem');
  if(!it) return;
  dragPayload = it.dataset.kind==='w' ? {t:'w', n:it.dataset.name}
              : it.dataset.kind==='m' ? {t:'m', id:it.dataset.id}
              : {t:'e', id:it.dataset.id};
  try{ e.dataTransfer.setData('text/plain', JSON.stringify(dragPayload)); }catch(err){}
  e.dataTransfer.effectAllowed='copy';
});
document.addEventListener('dragend', ()=>{ dragPayload=null; clearDragMarks(); });

function clearDragMarks(){
  document.querySelectorAll('.dragok,.dragbad').forEach(el=>el.classList.remove('dragok','dragbad'));
}
function dropTarget(e){
  return e.target.closest && (e.target.closest('.slot') || e.target.closest('.gpool'));
}
function canDrop(t){
  if(!dragPayload || !t) return false;
  const isGear = t.classList.contains('gpool');
  if(isGear) return dragPayload.t==='e';
  if(dragPayload.t==='m'){
    const u = state.units[+t.dataset.u], hp = t.dataset.hp;
    return !u.wmods[hp] && modCanAttach(u, hp, dragPayload.id);
  }
  if(dragPayload.t!=='w') return false;
  const u = state.units[+t.dataset.u], hp = t.dataset.hp, w = weaponByName[dragPayload.n];
  if(w.twoHanded && (hp==='左肩臂'||hp==='右肩臂'))
    return !u.mounts['左肩臂'] && !u.mounts['右肩臂'];
  return !u.mounts[hp];
}
document.addEventListener('dragover', e=>{
  const t = dropTarget(e);
  if(!t) return;
  e.preventDefault();
  clearDragMarks();
  t.classList.add(canDrop(t)?'dragok':'dragbad');
});
document.addEventListener('dragleave', e=>{
  const t = dropTarget(e);
  if(t) t.classList.remove('dragok','dragbad');
});
document.addEventListener('drop', e=>{
  const t = dropTarget(e);
  if(!t) return;
  e.preventDefault();
  if(!dragPayload){
    try{ dragPayload = JSON.parse(e.dataTransfer.getData('text/plain')); }catch(err){}
  }
  if(!dragPayload){ clearDragMarks(); return; }
  const u = state.units[+t.dataset.u];

  if(t.classList.contains('gpool')){
    if(dragPayload.t==='e'){
      const eq = equipById[dragPayload.id];
      if(eq.unique && u.gear.includes(eq.id)){ /* 擴充掛架僅一具 */ }
      else{
        u.gear.push(eq.id);
        if(eq.id==='rack'){ // 掛架佔用背部改裝容量:剝除背部既有改裝
          let stripped=false;
          for(const k of ['背部','背部2']) if(u.wmods[k]){ delete u.wmods[k]; stripped=true; }
          if(stripped) alert('擴充掛架已佔用背部改裝容量:背部武器的過載復位已移除。');
        }
      }
    }
  }else if(dragPayload.t==='m'){
    const hp = t.dataset.hp;
    if(!u.wmods[hp] && modCanAttach(u, hp, dragPayload.id)) u.wmods[hp]=dragPayload.id;
  }else if(dragPayload.t==='w'){
    const hp = t.dataset.hp, w = weaponByName[dragPayload.n];
    if(w.twoHanded && (hp==='左肩臂'||hp==='右肩臂')){
      if(!u.mounts['左肩臂'] && !u.mounts['右肩臂']){
        u.mounts['左肩臂']=w.name; u.mounts['右肩臂']=w.name;   // 雙手:同佔兩槽
      }
    }else if(!u.mounts[hp]){
      u.mounts[hp]=w.name;
    }
  }
  dragPayload=null; clearDragMarks(); commit();
});

/* 點擊事件(移除/步進) */
document.addEventListener('click', e=>{
  const el = e.target.closest && e.target.closest('[data-act]');
  if(!el) return;
  const act = el.dataset.act;
  if(act==='rmw'){
    const u = state.units[+el.dataset.u], hp = el.dataset.hp, n = u.mounts[hp];
    const w = n && weaponByName[n];
    if(w && w.twoHanded && (hp==='左肩臂'||hp==='右肩臂')){
      if(u.mounts['左肩臂']===n) u.mounts['左肩臂']=null;
      if(u.mounts['右肩臂']===n) u.mounts['右肩臂']=null;
    }else u.mounts[hp]=null;
    delete u.wmods[hp];
    commit();
  }else if(act==='rmm'){
    const u = state.units[+el.dataset.u];
    delete u.wmods[el.dataset.hp];
    commit();
  }else if(act==='rmg'){
    const u = state.units[+el.dataset.u], gi = +el.dataset.gi, id = u.gear[gi];
    u.gear.splice(gi,1);
    if(id==='rack' && !u.gear.includes('rack')){ u.mounts['背部2']=null; delete u.wmods['背部2']; } // 掛架移除→第二槽武器退回面板
    commit();
  }else if(act==='s+' || act==='s-'){
    const u = state.units[+el.dataset.u];
    u.structure = Math.min(10, Math.max(1, u.structure + (act==='s+'?1:-1)));
    commit();
  }
});
document.addEventListener('input', e=>{
  const el = e.target;
  if(el.dataset && el.dataset.act==='name'){
    state.units[+el.dataset.u].name = el.value;
    save(); renderTotals(); renderSheet();   // 不重繪輸入框本身,避免失焦
  }
});
document.addEventListener('change', e=>{
  const el = e.target;
  const act = el.dataset ? el.dataset.act : null;
  if(el.dataset && el.dataset.act==='armor'){
    state.units[+el.dataset.u].armor = el.value;
    commit();
  }else if(el.id==='budgetSel'){
    state.budget = el.value;
    if(state.budget!=='deluxe') state.options.deluxe350=false;
    if(state.budget==='deluxe') state.options.deluxe350=true;
    commit();
  }else if(act==='expchk'){
    state.expEnabled = el.checked;
    if(!el.checked){ // 關閉時清掉已裝的實驗品
      for(const u of state.units){
        const exq=new Set(DATA.equipment.filter(e=>e.exp).map(e=>e.id));
        u.gear=u.gear.filter(id=>!exq.has(id));
        for(const k of Object.keys(u.mounts)){
          const n=u.mounts[k]; const w=n&&weaponByName[n];
          if(w&&w.exp){ u.mounts[k]=null; delete u.wmods[k]; }
        }
      }
    }
    commit();
  }else if(act==='opt'){
    state.options[el.dataset.id] = el.checked;
    if(el.dataset.id==='deluxe350'){
      if(el.checked && state.budget!=='duel') state.budget='deluxe';
      else if(!el.checked && state.budget==='deluxe') state.budget='team';
    }
    commit();
  }
});

/* 工具列按鈕 */
document.getElementById('btnPrint').addEventListener('click', ()=>window.print());
document.getElementById('btnSample').addEventListener('click', ()=>{
  if(confirm('以範例隊伍(白兵/遊隼/雷雲)覆蓋目前編組?')){ state=sampleState(); commit(); }
});
document.getElementById('btnClear').addEventListener('click', ()=>{
  if(confirm('清空全部三台機體?')){ state=normalize({budget:state.budget,units:[]}); commit(); }
});
document.getElementById('btnShare').addEventListener('click', ()=>{
  save();
  const url = location.href;
  const done = ()=>{ const b=document.getElementById('btnShare'); const t=b.textContent;
    b.textContent='已複製!'; setTimeout(()=>b.textContent=t,1200); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done, ()=>prompt('請手動複製:',url));
  }else prompt('請手動複製:',url);
});
/* 一鍵把目前編組帶進對戰 Helper */
document.getElementById('btnHelper').addEventListener('click', ()=>{
  save();
  window.location.href = 'helper.html#f=' + encodeState(state);
});
window.addEventListener('hashchange', ()=>{
  const m = location.hash.match(/^#f=(.+)$/);
  if(!m) return;
  try{ state = normalize(decodeState(m[1])); renderAll(); }catch(e){}
});

/* ============================================================
   啟動
   ============================================================ */
boot();
renderCatalog();
renderAll();
</script>
